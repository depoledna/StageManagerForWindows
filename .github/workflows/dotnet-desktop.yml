name: StageManager CI

on:
  push:
    tags: [ "v*" ]

permissions:
  contents: read

jobs:
  # --------------------------------------------------------
  # Release build for pushes & tags on main
  # --------------------------------------------------------
  build-release:
    if: github.event_name == 'push'
    runs-on: windows-latest
    permissions:
      contents: write            # allow release-action to create GitHub Release

    env:
      PROJECT_PATH: StageManager/StageManager.csproj
      CONFIGURATION: Release

    steps:
    - name: Checkout source
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Setup .NET SDK
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 10.0.x
        cache: true
        cache-dependency-path: '**/*.csproj'

    - name: Extract version from tag
      id: version
      shell: bash
      run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

    - name: Publish x64
      run: >
        dotnet publish ${{ env.PROJECT_PATH }}
        --configuration ${{ env.CONFIGURATION }}
        --runtime win-x64
        --self-contained true
        -p:PublishSingleFile=true
        -p:IncludeNativeLibrariesForSelfExtract=true
        -p:PublishTrimmed=false
        -p:DebugType=None
        -p:DebugSymbols=false
        --output ./publish-x64
        -p:Version=${{ steps.version.outputs.VERSION }}

    - name: Publish ARM64
      run: >
        dotnet publish ${{ env.PROJECT_PATH }}
        --configuration ${{ env.CONFIGURATION }}
        --runtime win-arm64
        --self-contained true
        -p:PublishSingleFile=true
        -p:IncludeNativeLibrariesForSelfExtract=true
        -p:PublishTrimmed=false
        -p:DebugType=None
        -p:DebugSymbols=false
        --output ./publish-arm64
        -p:Version=${{ steps.version.outputs.VERSION }}

    # ------------------------------------------------------------------
    # Release .exe (x64 + ARM64)
    # ------------------------------------------------------------------

    - name: Rename artifacts
      shell: pwsh
      run: |
        Rename-Item ./publish-x64/StageManager.exe StageManager-x64.exe
        Rename-Item ./publish-arm64/StageManager.exe StageManager-arm64.exe

    - name: Upload x64 artifact
      uses: actions/upload-artifact@v4
      with:
        name: StageManager-x64
        path: publish-x64/StageManager-x64.exe

    - name: Upload ARM64 artifact
      uses: actions/upload-artifact@v4
      with:
        name: StageManager-arm64
        path: publish-arm64/StageManager-arm64.exe

    - name: Create GitHub Release (tag push)
      if: startsWith(github.ref, 'refs/tags/')
      uses: ncipollo/release-action@v1
      with:
        artifacts: |
          publish-x64/StageManager-x64.exe
          publish-arm64/StageManager-arm64.exe
        body: "Automated release from GitHub Actions"
        token: ${{ secrets.GITHUB_TOKEN }}

  # --------------------------------------------------------
  # Static code analysis with CodeQL
  # --------------------------------------------------------
  codeql:
    name: CodeQL
    runs-on: windows-latest
    permissions:
      security-events: write

    steps:
    - uses: actions/checkout@v4

    - name: Initialize CodeQL
      uses: github/codeql-action/init@v3
      with:
        languages: csharp

    - name: Autobuild
      uses: github/codeql-action/autobuild@v3

    - name: Perform CodeQL analysis
      uses: github/codeql-action/analyze@v3

  # --------------------------------------------------------
  # Secret scanning with Gitleaks
  # --------------------------------------------------------
  secret-scan:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout source
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Run Gitleaks
      uses: gitleaks/gitleaks-action@v2
      with:
        fail: true
